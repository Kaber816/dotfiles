# vim:ft=kitty
## Gruvbox Dark + Transparent Setup

font_family JetBrains Mono
bold_font auto

# ---- Cursor ----
cursor_shape beam
cursor_blink_interval 0.5
cursor_stop_blinking_after 5.0
cursor_text_color #282828
cursor #928374
cursor_trail 0

# ---- Bell ----
visual_bell_duration 0
enable_audio_bell no
bell_on_tab no

# ---- Transparency ----
background_opacity 0.75
dynamic_background_opacity yes

# ---- Window Padding ----
window_padding_width 8

# ---- Window Borders ----
window_border_width 1
active_border_color #b16286
inactive_border_color #3c3836

# ---- Base Colors (Gruvbox Dark) ----
background  #282828
foreground  #ebdbb2

selection_foreground  #282828
selection_background  #928374

url_color #83a598

active_tab_foreground   #ebdbb2
active_tab_background   #282828
inactive_tab_foreground #928374
inactive_tab_background #282828

# ---- ANSI Colors ----

color0  #282828
color8  #928374

color1  #cc241d
color9  #fb4934

color2  #98971a
color10 #b8bb26

color3  #d79921
color11 #fabd2d

color4  #458588
color12 #83a598

color5  #b16286
color13 #d3869b

color6  #689d6a
color14 #8ec07c

color7  #a89984
color15 #ebdbb2

underline_color #b8bb26
