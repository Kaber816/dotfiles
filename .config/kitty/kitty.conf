# vim:ft=kitty
## name:     E-Ink Dark Transparent (Animated)
## based on: E-Ink by Algilbert Gomez

font_family JetBrains Mono
bold_font auto

# ---- Cursor (motion + feedback) ----
cursor_shape beam
cursor_blink_interval 0.5
cursor_stop_blinking_after 5.0
# cursor_trail 3

# ---- Transparency ----
background_opacity 0.75
dynamic_background_opacity yes

# ---- Visual bell (soft flash) ----
enable_audio_bell no
visual_bell_duration 0.12
visual_bell_color #7A7A7A

# ---- Window polish (feels animated on focus) ----
window_border_width 1
active_border_color   #7A7A7A
inactive_border_color #2A2A2A

# ---- Base colors ----
foreground #C0C0C0
background #121212

selection_foreground none
selection_background #2A2A2A

# ---- ANSI colors ----

# black
color0  #121212
color8  #3A3A3A

# red
color1  #5C5C5C
color9  #6A6A6A

# green
color2  #8A8A8A
color10 #9A9A9A

# yellow
color3  #7A7A7A
color11 #8A8A8A

# blue
color4  #6A6A6A
color12 #7A7A7A

# magenta
color5  #9A9A9A
color13 #AAAAAA

# cyan
color6  #7E7E7E
color14 #8E8E8E

# white
color7  #B0B0B0
color15 #D0D0D0

