# vim:ft=kitty
## name:     E-Ink Dark Transparent (Matcha)
## based on: E-Ink by Algilbert Gomez
## vibe:     E-ink grayscale with subtle plant / matcha accents

font_family JetBrains Mono
bold_font auto

# ---- Cursor (calm, no flash) ----
cursor_shape beam
cursor_blink_interval 0.5
cursor_stop_blinking_after 5.0
cursor_text_color #121212
cursor #8F9F7B
cursor_trail 0

# ---- Bell / visual flash ----
visual_bell_duration 0
enable_audio_bell no
bell_on_tab no

# ---- Transparency ----
background_opacity 0.75
dynamic_background_opacity yes

# ---- Window polish ----
window_border_width 1
active_border_color #7E8B6B
inactive_border_color #2A2A2A

# ---- Base colors ----
foreground #C0C0C0
background #121212

selection_foreground none
selection_background #2A2A2A

# ---- URL / tabs ----
url_color #8F9F7B
active_tab_foreground #D0D0D0
active_tab_background #121212
inactive_tab_foreground #7A7A7A
inactive_tab_background #121212

# ---- ANSI colors ----

# black / paper
color0  #121212
color8  #3A3A3A

# red (neutral)
color1  #5C5C5C
color9  #6A6A6A

# green (matcha)
color2  #8F9F7B
color10 #7E8B6B

# yellow (warm clay)
color3  #8A846A
color11 #9A9478

# blue (slate ink)
color4  #6A6A6A
color12 #7A7A7A

# magenta (parchment)
color5  #9A9A9A
color13 #AAAAAA

# cyan (stone)
color6  #7E8E84
color14 #8FA09A

# white / highlight
color7  #B0B0B0
color15 #D0D0D0

# ---- Underlines ----
underline_color #7E8B6B

